title: Azure Face in Foundry Tools documentation # < 60 chars
summary: The cloud-based Azure Face service The Azure Face service provides AI algorithms that detect, recognize, and analyze human faces in images. Facial recognition software is important in many scenarios, such as identification, touchless access control, and automatic face blurring for privacy. # < 160 chars

